<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Saitim Energy S.L.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
    
    <style>
        /* Reseteamos los márgenes para que ocupe toda la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* El contenedor a pantalla completa (Minimalista como la foto) */
        .error-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            
            /* El fondo de puntitos que te gustó */
            background-color: #f8f9fa; 
            background-image: radial-gradient(#C4EFF2 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .error-logo {
            width: 220px;
            margin-bottom: 40px;
        }

        .error-title {
            font-family: 'bauhaus-light', sans-serif;
            font-size: 55px;
            color: #004047;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
        }

        .error-title span {
            color: #0093A3; /* El turquesa para destacar el error */
        }

        .error-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            color: #333333;
            max-width: 600px;
            margin: 0 0 40px 0;
            line-height: 1.6;
        }

        .error-btn {
            background-color: #0093A3;
            color: #ffffff !important;
            padding: 15px 40px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 15px;
            border-radius: 4px; /* Un pelín redondeado, como en tu imagen */
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .error-btn:hover {
            background-color: #004047;
            transform: translateY(-3px);
        }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .error-logo { width: 180px; margin-bottom: 30px; }
            .error-title { font-size: 38px; }
            .error-text { font-size: 16px; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <!-- Logo centrado (Usamos el que tiene color para que contraste con el fondo claro) -->
        <img src="/images/Saitim-blanco.png" alt="Saitim Energy" class="error-logo">
        
        <!-- Título principal -->
        <h1 class="error-title"><span>404</span> - ¡Página no encontrada!</h1>
        
        <!-- Texto explicativo -->
        <p class="error-text">El enlace que has seguido está roto o la página ha sido eliminada. No te preocupes, puedes volver al inicio y seguir navegando.</p>
        
        <!-- Botón -->
        <a href="/fr/index.html" class="error-btn">Volver al inicio</a>
    </div>

</body>
</html>
