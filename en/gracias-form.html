<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent! - Saitim Energy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
          <link rel="icon" type="image/png" href="/images/logo.png">
    <style>
        /* Estilos exclusivos para esta pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #004047; /* Tu verde oscuro corporativo */
        }
        
        .gracias-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #ffffff;
        }

        .gracias-container h1 {
            /* Si tienes conectada tu fuente Bauhaus, se verá genial aquí */
            font-family: 'Bauhaus Light Regular', sans-serif; 
            font-size: 55px;
            color: #C4EFF2; /* Tu cyan clarito */
            margin-bottom: 20px;
            margin-top: 0;
        }

        .gracias-container p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .btn-volver {
            display: inline-block;
            padding: 15px 35px;
            background-color: #0093A3;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-volver:hover {
            background-color: #C4EFF2;
            color: #004047;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="gracias-container">
        <img src="/images/Saitim-sincolor.png" alt="Saitim Logo" style="width: 200px; margin-bottom: 40px;">
        
        <h1>Message Sent!</h1>
        <p>Thank you for contacting Saitim Energy S.L.<br> We have successfully received your information and our team will get in touch with you as soon as possible.</p>
        
        <a href="/en/index.html" class="btn-volver">Back to home</a>
    </div>
</body>
</html>
